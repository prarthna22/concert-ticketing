<!DOCTYPE html>
<html>
<head>
    <title>Organizer Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .dashboard-container {
            padding: 50px;
        }

        h1 {
            margin-bottom: 30px;
            color: #222;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
        }

        .card h2 {
            margin: 0;
            font-size: 36px;
            color: #0052cc;
        }

        .card p {
            margin-top: 10px;
            color: #555;
            font-size: 16px;
        }

        .chart-container {
            margin-top: 40px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.08);
            height: 450px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 22px;
            background: #0052cc;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .back-btn:hover {
            background: #003f9e;
        }
    </style>
</head>

<body>

<div class="dashboard-container">

    <h1>📊 Organizer Dashboard</h1>

    <div class="stats-grid">

        <div class="card">
            <h2>{{ total_events }}</h2>
            <p>Total Events</p>
        </div>

        <div class="card">
            <h2>{{ total_bookings }}</h2>
            <p>Total Bookings</p>
        </div>

        <div class="card">
            <h2>{{ total_tickets_sold }}</h2>
            <p>Tickets Sold</p>
        </div>

        <div class="card">
            <h2>€{{ total_revenue }}</h2>
            <p>Total Revenue</p>
        </div>

    </div>

    <div class="chart-container">
        <canvas id="salesChart"></canvas>
    </div>

    <a href="{% url 'event_list' %}" class="back-btn">
        ← Back to Events
    </a>

</div>

<!-- ✅ CHART.JS CDN (THIS WAS MISSING → MAIN ISSUE) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    try {
        const eventNames = JSON.parse('{{ event_names|escapejs }}');
        const bookingCounts = JSON.parse('{{ booking_counts|escapejs }}');

        console.log("EVENTS:", eventNames);
        console.log("COUNTS:", bookingCounts);

        const canvas = document.getElementById('salesChart');

        if (!canvas) {
            console.error("Canvas not found!");
        } else {
            const ctx = canvas.getContext('2d');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: eventNames,
                    datasets: [{
                        label: 'Tickets Per Event',
                        data: bookingCounts,
                        backgroundColor: '#0052cc'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }
    } catch (error) {
        console.error("ERROR:", error);
    }
</script>

</body>
</html>
