<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>
    <style>
        body {
            background: linear-gradient(135deg, #1f1f1f, #2c2c2c);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            margin: 0;
        }

        .box {
            background: #333;
            padding: 35px;
            border-radius: 16px;
            width: 420px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px 0;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: orange;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #e69500;
            transform: scale(1.02);
        }

        .helptext {
            font-size: 13px;
            color: #bbb;
            margin-top: -10px;
            margin-bottom: 10px;
            display: block;
        }

        .errorlist {
            color: #ff6b6b;
            font-size: 13px;
            list-style: none;
            padding-left: 0;
            margin-bottom: 10px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Sign Up</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
