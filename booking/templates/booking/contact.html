{% extends 'booking/base.html' %}

{% block content %}

<div style="display:flex; justify-content:center; align-items:center; min-height:70vh;">

    <div style="
        width: 400px;
        padding: 30px;
        border-radius: 15px;
        background: rgba(20,30,30,0.9);
        box-shadow: 0 0 25px rgba(0,255,170,0.3);
        backdrop-filter: blur(10px);
    ">

        <h2 style="text-align:center; color:#00ffcc;">📩 Contact Support</h2>

        <form method="post">
            {% csrf_token %}

            <input type="text" name="name" placeholder="Your Name" required
                   style="width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none;background:#2a3a3a;color:white;">

            <input type="email" name="email" placeholder="Your Email" required
                   style="width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none;background:#2a3a3a;color:white;">

            <textarea name="message" placeholder="Describe your issue..."
                      required
                      style="width:100%;padding:10px;margin:10px 0;border-radius:8px;border:none;background:#2a3a3a;color:white;height:120px;">
            </textarea>

            <button type="submit"
                    style="width:100%;padding:12px;border:none;border-radius:8px;
                           background:linear-gradient(135deg,#00ffcc,#00c896);
                           font-weight:bold;cursor:pointer;">
                Send Message
            </button>

        </form>

    </div>

</div>

{% endblock %}
